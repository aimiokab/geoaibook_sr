# @package _global_

defaults:
  - override /model: image_cfm_SR.yaml
  - override /callbacks: no_stopping
  - override /logger:
      - csv.yaml
      - wandb.yaml
  - override /datamodule: breizhsr.yaml
  - override /trainer: ddp.yaml

name: "cfm"
seed: 42

datamodule:
  batch_size: 32

model:
  _target_: src.models.cfm_module.CFMLitModule
  sigma_min: 1e-4

  scheduler:
    _target_: timm.scheduler.PolyLRScheduler
    _partial_: True
    warmup_t: 200
    warmup_lr_init: 1e-8
    t_initial: 2000

trainer:
  devices: 2
  max_epochs: 2000
  check_val_every_n_epoch: 40
  limit_val_batches: 0.01
